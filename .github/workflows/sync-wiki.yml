name: Sync wiki

on:
  push:
    branches: [main, master]
    paths:
      - "wiki/**"
      - "scripts/sync_wiki.py"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}.wiki', github.repository) }}
          path: wiki-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy wiki pages
        run: python scripts/sync_wiki.py wiki wiki-repo

      - name: Commit and push wiki
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -m "Sync wiki from ${{ github.repository }}@${{ github.sha }}"
          git push
